<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Send to Telegram</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #fff;
      padding: 20px 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 350px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
      resize: none;
      height: 80px;
    }
    input[type="file"] {
      padding: 5px;
    }
    button {
      background: #007BFF;
      color: #fff;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }
    button:hover {
      background: #0056b3;
    }
    .status {
      font-size: 14px;
      color: green;
      min-height: 18px;
    }
  </style>
</head>
<body>

<div class="container">
  <h3>Send to Telegram</h3>
  <textarea id="msg" placeholder="Type your message here..."></textarea>
  <input type="file" id="image">
  <button onclick="sendToTelegram()">Send</button>
  <div class="status" id="status"></div>
</div>

<script>
  const WEB_APP_URL = "xxxxxxxxxxxxxxxxxxxx"; // <-- Replace with your Web App URL

  function sendToTelegram() {
    const msg = document.getElementById("msg").value;
    const imageInput = document.getElementById("image");
    const statusEl = document.getElementById("status");

    const formData = new FormData();
    formData.append("msg", msg);

    if (imageInput.files.length > 0) {
      formData.append("file", imageInput.files[0]); // field name doesn't matter
    }

    statusEl.textContent = "Sending...";

    fetch(WEB_APP_URL, {
      method: "POST",
      body: formData
    })
    .then(res => res.text())
    .then(res => {
      if (res === "OK") {
        statusEl.textContent = "✅ Sent successfully!";
        document.getElementById("msg").value = "";
        imageInput.value = "";
      } else {
        statusEl.textContent = "❌ Error sending.";
      }
    })
    .catch(err => {
      console.error(err);
      statusEl.textContent = "❌ Error sending.";
    });
  }
</script>

</body>
</html>
