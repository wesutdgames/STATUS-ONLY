<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<title>የባቡር እንቅስቃሴ ሁኔታ - NS & EW</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Segoe UI', Roboto, 'Arial', sans-serif;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; gap:30px; padding:20px;
}

/* Banner */
#welcomeBanner {
  width:100%; max-width:1000px;
  background:#F7AE05;
  border-radius:50px;
  padding:16px;
  font-size:1.6rem;
  color:white;
  text-align:center;
}

/* Cards */
.status-box {
  position:relative;
  background:white;
  border-radius:30px;
  width:480px;
  max-width:90vw;
  display:flex;
}

.status-label {
  width:28%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:white;
}

#trainNS .status-label { background:#0924ED; }
#trainEW .status-label { background:#05F714; }

.status-message {
  width:72%;
  padding:20px;
  text-align:center;
}

.operating .status-message { color:#0f7b3a; }
.stopped .status-message { color:#c0392b; }
.finished .status-message { color:#1f618d; }
.returning .status-message { color:#d35400; }
.construction .status-message { color:#884ea0; }

/* Red dot */
.status-dot {
  position:absolute;
  top:14px;
  right:18px;
  width:14px;
  height:14px;
  border-radius:50%;
  background:red;
  animation:pulse 0.8s infinite alternate;
}

@keyframes pulse {
  0% { transform:scale(1); }
  100% { transform:scale(1.3); }
}
</style>
</head>

<body>

<div id="welcomeBanner">
  እንኳን ወደ አዲስ አበባ ቀላል ባቡር ትራንስፖርት በደህና መጡ
</div>

<div class="status-box operating" id="trainNS">
  <div class="status-label">የቃሊቲ - ፒያሳ</div>
  <div class="status-message" id="statusMsgNS">⏳ Loading...</div>
</div>

<div class="status-box operating" id="trainEW">
  <div class="status-label">የአያት - ጦርሐይሎች</div>
  <div class="status-message" id="statusMsgEW">⏳ Loading...</div>
</div>

<script>
/* ===============================
   JSON URLs
=============================== */
const NS_JSON = "https://wesutdgames.github.io/status/ns.json";
const EW_JSON = "https://wesutdgames.github.io/status/ew.json";

/* ===============================
   BASE64 DECODER
=============================== */
function decodeBase64UTF8(base64) {
  try {
    const binary = atob(base64);
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
    return new TextDecoder("utf-8").decode(bytes);
  } catch {
    return "⚠️ መልዕክት አልተነበበም";
  }
}

/* ===============================
   NS UPDATE
=============================== */
async function updateNS() {
  const box = document.getElementById("trainNS");
  const msgEl = document.getElementById("statusMsgNS");

  try {
    const res = await fetch(NS_JSON + "?t=" + Date.now());
    const row = await res.json();

    let status = row?.status?.toLowerCase();
    let message = decodeBase64UTF8(row?.am || "");

    if (!status || !message) {
      const hour = new Date().getHours();

      if (hour >= 6 && hour < 22) {
        status = "operating";
        message = "🚆 ሙሉ አገልግሎት እየሰጠ ነው";
      } else if (hour >= 22) {
        status = "finished";
        message = "🏁 አገልግሎት ተጠናቋል";
      } else if (hour < 5) {
        status = "construction";
        message = "🚧 የጥገና ስራ እየተካሄደ ነው";
      } else {
        status = "returning";
        message = "🚆 ለመጀመር በዝግጅት ላይ";
      }
    }

    box.className = "status-box " + status;
    msgEl.textContent = message;

    box.querySelector(".status-dot")?.remove();
    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

  } catch {
    msgEl.textContent = "❌ ኢንተርኔት የለም";
    box.className = "status-box stopped";
  }
}

/* ===============================
   EW UPDATE
=============================== */
async function updateEW() {
  const box = document.getElementById("trainEW");
  const msgEl = document.getElementById("statusMsgEW");

  try {
    const res = await fetch(EW_JSON + "?t=" + Date.now());
    const row = await res.json();

    let status = row?.status?.toLowerCase();
    let message = decodeBase64UTF8(row?.am || "");

    if (!status || !message) {
      const hour = new Date().getHours();

      if (hour >= 6 && hour < 22) {
        status = "operating";
        message = "🚆 ሙሉ አገልግሎት እየሰጠ ነው";
      } else if (hour >= 22) {
        status = "finished";
        message = "🏁 አገልግሎት ተጠናቋል";
      } else if (hour < 5) {
        status = "construction";
        message = "🚧 የጥገና ስራ እየተካሄደ ነው";
      } else {
        status = "returning";
        message = "🚆 ለመጀመር በዝግጅት ላይ";
      }
    }

    box.className = "status-box " + status;
    msgEl.textContent = message;

    box.querySelector(".status-dot")?.remove();
    if (status === "stopped") {
      const dot = document.createElement("span");
      dot.className = "status-dot";
      box.appendChild(dot);
    }

  } catch {
    msgEl.textContent = "❌ ኢንተርኔት የለም";
    box.className = "status-box stopped";
  }
}

/* ===============================
   LOAD
=============================== */
function updateAll() {
  updateNS();
  updateEW();
}

updateAll();
setInterval(updateAll, 60000);
</script>

</body>
</html>
